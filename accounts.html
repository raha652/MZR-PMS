
<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="accounts_page_title">مدیریت اکانت‌ها - سیستم مدیریت موتور سکیل ها</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="./global.css">
  <script src="./translations.js"></script>
</head>
 <body class="h-screen">
<div id="loading-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.65); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; color: white; font-size: 1rem;">
  
  <div class="motorbike-loader">
    <div class="bike"><a href="https://ibb.co/kgFcnCHj">
  <img class="small-img" src="https://i.ibb.co/kgFcnCHj/emojis-com-a-motor-bike-rideng-emoji.png" alt="emojis-com-a-motor-bike-rideng-emoji">
</a>
</div>
    <div class="smoke smoke1">💨</div>
    <div class="smoke smoke2">🌫️</div>
  </div>
  
  <p style="margin: 10px 0 0; font-weight: bold; text-shadow: 0 0 10px rgba(255,255,255,0.5);" data-i18n="loading">
    در حال بارگذاری...
  </p>
</div>
  <div class="h-screen p-6">
    
    <div class="card p-6 mb-6" id="header-section">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-4">
          <div class="motorcycle-icon">
            👤
          </div>
          <div>
            <h1 id="dashboard-title" class="text-3xl font-bold text-white" data-i18n="accounts_management">مدیریت اکانت‌ها</h1>
            <p id="company-name" class="text-gray-300 mt-1" data-i18n="company_name">پارکینگ مزار شریف</p>
          </div>
        </div>
        <div class="flex items-center gap-4">
          <!-- Language Toggle Button -->
          <div class="relative">
            <button id="language-toggle" class="w-10 h-10 rounded-full bg-white bg-opacity-20 flex items-center justify-center cursor-pointer hover:bg-opacity-30 transition-all duration-200 text-xl" onclick="toggleLanguageDropdown()" title="انتخاب زبان">
              <span id="language-icon">🌐</span>
            </button>
            <div id="language-dropdown" class="absolute hidden z-50 w-48 bg-white rounded-lg shadow-lg top-12 left-0">
              <div class="py-2">
                <button onclick="setLanguage('fa'); toggleLanguageDropdown();" class="w-full text-right px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 flex items-center gap-2">
                  <span class="text-xl">🇦🇫</span>
                  <span>فارسی</span>
                </button>
                <button onclick="setLanguage('en'); toggleLanguageDropdown();" class="w-full text-right px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 flex items-center gap-2">
                  <span class="text-xl">🇺🇸</span>
                  <span>English</span>
                </button>
                <button onclick="setLanguage('ps'); toggleLanguageDropdown();" class="w-full text-right px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 flex items-center gap-2">
                  <span class="text-xl">🇦🇫</span>
                  <span>پښتو</span>
                </button>
              </div>
            </div>
          </div>
          <div class="text-left">
            <p class="text-sm text-gray-300" data-i18n="date">تاریخ</p>
            <p id="current-date" class="text-lg font-bold text-white"></p>
          </div>
        </div>
      </div>
    </div>
    
    <div id="accounts-page">
      <div class="card p-6 mb-6">
        <div class="flex items-center justify-between mb-6">
          <button class="btn btn-secondary" onclick="navigateTo('./management.html')"> ← <span data-i18n="back_to_management">بازگشت به مدیریت</span> </button>
          <h2 class="text-2xl font-bold text-white" data-i18n="accounts_list">لیست اکانت‌ها</h2>
          <button class="btn btn-success" onclick="openNewAccountModal()">➕ <span data-i18n="add_new_account">افزودن اکانت جدید</span></button>
        </div>
        <div class="mb-6">
  <input type="text" id="account-search" class="input-field w-full text-gray-800" data-i18n-placeholder="search_accounts_placeholder" placeholder="جستجو بر اساس نام، نام کاربری، نقش، موقعیت شغلی یا دیپارتمنت...">
</div>
        <div id="accounts-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        
        </div>
      </div>
    </div>
  </div>

  <div id="new-account-modal" class="modal">
    <div class="modal-content">
      <h2 class="text-2xl font-bold text-gray-100 mb-6" data-i18n="add_new_account">افزودن اکانت جدید</h2>
<form id="new-account-form" onsubmit="submitNewAccount(event)">
  <div class="space-y-4">
    <div>
      <label class="block text-sm font-semibold text-gray-100 mb-2" data-i18n="full_name">نام کامل</label>
      <input type="text" id="account-fullname" class="input-field text-gray-800 mb-6" data-i18n-placeholder="example_employee_name" placeholder="مثال: شهاب حمیدی" required>
    </div>
    <div>
      <label class="block text-sm font-semibold text-gray-100 mb-2" data-i18n="username">نام کاربری</label>
      <input type="text" id="account-username" class="input-field text-gray-800 mb-6" data-i18n-placeholder="username" placeholder="نام کاربری" required>
    </div>
    <div>
      <label class="block text-sm font-semibold text-gray-100 mb-2" data-i18n="password">رمز عبور</label>
      <input type="password" id="account-password" class="input-field text-gray-800 mb-6" data-i18n-placeholder="password" placeholder="رمز عبور" required>
    </div>
    <div>
      <label class="block text-sm font-semibold text-gray-100 mb-2" data-i18n="role">نقش</label>
      <select id="account-role" class="input-field text-gray-800 mb-6" required>
        <option value="" data-i18n="select">انتخاب نقش</option>
        <option value="user" data-i18n="user">کاربر</option>
        <option value="admin" data-i18n="admin">ادمین</option>
      </select>
    </div>
    <div>
      <label class="block text-sm font-semibold text-gray-100 mb-2" data-i18n="position">موقعیت شغلی</label>
      <input type="text" id="account-position" class="input-field text-gray-800 mb-6" data-i18n-placeholder="position" placeholder="مثال: Electrical ENG" required>
    </div>
    <!-- فیلد جدید: department -->
    <div>
      <label class="block text-sm font-semibold text-gray-100 mb-2" data-i18n="department">دیپارتمنت</label>
      <input type="text" id="account-department" class="input-field text-gray-800 mb-6" data-i18n-placeholder="example_department" placeholder="مثال: پاور" required>
    </div>
    <div>
      <label class="block text-sm font-semibold text-gray-100 mb-2" data-i18n="displays">نمایش‌های اختصاصی</label>
      <div class="flex flex-wrap gap-4 mb-6 bg-gray-800 p-4 rounded-lg">
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" id="account-show-maintenance" class="w-5 h-5 rounded">
          <span class="text-gray-200">🔧 <span data-i18n="maintenance">تعمیرات</span></span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" id="account-show-notifications" class="w-5 h-5 rounded">
          <span class="text-gray-200">🔔 <span data-i18n="notifications">اعلانات</span></span>
        </label>
      </div>
    </div>
    <div class="flex gap-3 mt-6">
      <button type="submit" class="btn btn-success flex-1">✅ <span data-i18n="save">ذخیره</span></button>
      <button type="button" class="btn btn-secondary flex-1" onclick="closeModal('new-account-modal')">❌ <span data-i18n="cancel">انصراف</span></button>
    </div>
  </div>
</form>

    </div>
  </div>

<div id="edit-account-modal" class="modal">
  <div class="modal-content">
    <h2 class="text-2xl font-bold text-gray-100 mb-6" data-i18n="edit_account">ویرایش اکانت</h2>
    <p class="text-gray-600 mb-4" id="edit-account-username"></p>
    <form id="edit-account-form" onsubmit="submitEditAccount(event)">
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-100 mb-2" data-i18n="full_name">نام کامل</label>
          <input type="text" id="edit-account-fullname" class="input-field text-gray-800 mb-6" required>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-100 mb-2" data-i18n="username">نام کاربری</label>
          <input type="text" id="edit-account-username-input" class="input-field text-gray-800 mb-6" required> 
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-100 mb-2" data-i18n="password">رمز عبور</label>
          <input type="password" id="edit-account-password" class="input-field text-gray-800 mb-6" required>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-100 mb-2" data-i18n="role">نقش</label>
          <select id="edit-account-role" class="input-field text-gray-800 mb-6" required>
            <option value="user" data-i18n="user">کاربر</option>
            <option value="admin" data-i18n="admin">ادمین</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-100 mb-2" data-i18n="position">موقعیت شغلی</label>
          <input type="text" id="edit-account-position" class="input-field text-gray-800 mb-6" required>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-100 mb-2" data-i18n="department">دیپارتمنت</label>
          <input type="text" id="edit-account-department" class="input-field text-gray-800 mb-6" required>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-100 mb-2" data-i18n="displays">نمایش‌های اختصاصی</label>
          <div class="flex flex-wrap gap-4 mb-6 bg-gray-800 p-4 rounded-lg">
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" id="edit-account-show-maintenance" class="w-5 h-5 rounded">
              <span class="text-gray-200">🔧 <span data-i18n="maintenance">تعمیرات</span></span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" id="edit-account-show-notifications" class="w-5 h-5 rounded">
              <span class="text-gray-200">🔔 <span data-i18n="notifications">اعلانات</span></span>
            </label>
          </div>
        </div>
        <div class="flex gap-3 mt-6">
          <button type="submit" class="btn btn-success flex-1">✅ <span data-i18n="save">به‌روزرسانی</span></button>
          <button type="button" class="btn btn-secondary flex-1" onclick="closeModal('edit-account-modal')">❌ <span data-i18n="cancel">انصراف</span></button>
        </div>
      </div>
    </form>
  </div>
</div>

  <div id="toast" class="toast"><span id="toast-icon">✅</span> <span id="toast-message"></span></div>
  <script src="./googleSheets.js"></script>
  <script src="./index.js"></script>
</body>

</html>
