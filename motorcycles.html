    <div id="password-modal" class="modal">
      <div class="modal-content">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">🔐 احراز هویت</h2>
        <div
          class="mb-4 p-4 bg-gradient-to-r from-blue-50 to-purple-50 border border-blue-200 rounded-lg"
        >
          <p id="password-message" class="text-sm text-blue-800">
            برای دسترسی به این بخش، رمز عبور را وارد کنید
          </p>
        </div>
        <form id="password-form" onsubmit="verifyPassword(event)">
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2"
                >رمز عبور</label
              >
              <input
                type="password"
                id="password-input"
                class="input-field"
                placeholder="رمز عبور را وارد کنید"
                required
              />
            </div>
            <div class="flex gap-3 mt-6">
              <button type="submit" class="btn btn-success flex-1">
                ✅ تأیید
              </button>
              <button
                type="button"
                class="btn btn-secondary flex-1"
                onclick="closeModal('password-modal')"
              >
                ❌ انصراف
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
    <div id="new-request-modal" class="modal">

                  <span id="department-display">دیپارتمنت را انتخاب کنید</span>
                  <span>▼</span>
                </button>

                    <input

                      placeholder="🔍 جستجو در دیپارتمنت‌ها..."

                    />
                  </div>
                  <div
                    id="department-options"
                    class="max-h-48 overflow-y-auto"

                </div>
                <input type="hidden" id="selected-department" required />

            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2"

              >

                  id="employee-select"
                  class="input-field text-right cursor-pointer flex items-center justify-between opacity-50"
                  onclick="toggleEmployeeDropdown()"
                  disabled
                >
                  <span id="employee-display"
                    >ابتدا دیپارتمنت را انتخاب کنید</span
                  >
                  <span>▼</span>
                </button>
                <div
                  id="employee-dropdown"
                  class="absolute top-full left-0 right-0 bg-white border border-gray-300 rounded-lg shadow-lg max-h-64 overflow-hidden z-10 hidden"
                >
                  <div class="p-3 border-b border-gray-200">
                    <input
                      type="text"
                      id="employee-search"
                      class="w-full p-2 border border-gray-300 rounded-md text-sm"

                    />
                  </div>
                  <div
                    id="employee-options"
                    class="max-h-48 overflow-y-auto"
                  ></div>
                </div>
                <input type="hidden" id="selected-employee" required />
              </div>
            </div>

                >انتخاب موتور سکیل</label
              >
              <div class="relative">
                <button
                  type="button"
                  id="motorcycle-select"
                  class="input-field text-right cursor-pointer flex items-center justify-between opacity-50"
                  onclick="toggleMotorcycleDropdown()"
                  disabled
                >
                  <span id="motorcycle-display"
                    >ابتدا دیپارتمنت را انتخاب کنید</span
                  >
                  <span>▼</span>
                </button>

                  id="motorcycle-dropdown"
                  class="absolute top-full left-0 right-0 bg-white border border-gray-300 rounded-lg shadow-lg max-h-64 overflow-hidden z-10 hidden"

                  <div class="p-3 border-b border-gray-200">
                    <input
                      type="text"
                      id="motorcycle-search"
                      class="w-full p-2 border border-gray-300 rounded-md text-sm"
                      placeholder="🔍 جستجو در موتور سکیل‌ها..."
                      oninput="searchMotorcycles()"
                    />

                  <div
                    id="motorcycle-options"
                    class="max-h-48 overflow-y-auto"
                  ></div>
                </div>

                ❌ انصراف

    </div>
    <div id="new-motorcycle-modal" class="modal">
      <div class="modal-content">
        <h2 class="text-2xl font-bold text-gray-100 mb-6" data-i18n="add_new_motorcycle">
          افزودن موتور سکیل جدید
        </h2>
        <form id="new-motorcycle-form" onsubmit="submitNewMotorcycle(event)">
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-semibold text-gray-100 mb-2" data-i18n="motorcycle_name"
                >نام موتور سکیل</label
              >
              <input
                type="text"
                id="motorcycle-name"
                class="input-field block text-sm font-semibold text-gray-700 mb-2"
                data-i18n-placeholder="example_motorcycle_name"
                placeholder="مثال: لمر"
                required
              />
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-100 mb-2" data-i18n="color"
                >رنگ</label
              >
              <input
                type="text"
                id="motorcycle-color"
                class="input-field text-gray-700 mb-2"
                data-i18n-placeholder="example_color"
                placeholder="مثال: آبی"
                required
              />
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-100 mb-2" data-i18n="motorcycle_id"
                >آیدی</label
              >
              <input
                type="text"
                id="motorcycle-id"
                class="input-field text-gray-700 mb-2"
                data-i18n-placeholder="example_id"
                placeholder="مثال: TRN_01"
                required
              />
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-100 mb-2" data-i18n="motorcycle_plate"
                >شماره پلاک</label
              >
              <input
                type="text"
                id="motorcycle-plate"
                class="input-field text-gray-700 mb-2"
                data-i18n-placeholder="example_plate"
                placeholder="مثال: TS-01"
                required
              />
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-100 mb-2" data-i18n="document_type"
                >نوعیت اسناد</label
              >
              <select
                id="motorcycle-document-type"
                class="input-field block text-sm font-semibold text-gray-700 mb-2"
                required
                onchange="toggleLicenseField()"
              >
                <option value="" data-i18n="select">انتخاب کنید</option>
                <option value="جواز سیر" data-i18n="travel_permit">جواز سیر</option>
                <option value="اسناد صد فی صد" data-i18n="full_documents">اسناد صد فی صد</option>
                <option value="ندارد" data-i18n="no_gps">ندارد</option>
              </select>
            </div>
            <div id="license-number-field" style="display: none">
              <label class="block text-sm font-semibold text-gray-100 mb-2" data-i18n="license_number"
                >نمبر جواز سیر</label
              >
              <input
                type="text"
                id="motorcycle-license"
                class="input-field text-gray-700 mb-2"
                data-i18n-placeholder="example_license"
                placeholder="مثال: 12345"
              />
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-100 mb-2" data-i18n="chassis_number"
                >نمبر شاسی</label
              >
              <input
                type="text"
                id="motorcycle-chassis-number"
                class="input-field text-gray-700 mb-2"
                data-i18n-placeholder="example_chassis"
                placeholder="مثال: CHS-001"
                required
              />
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-100 mb-2" data-i18n="engine_number"
                >نمبر انجین</label
              >
              <input
                type="text"
                id="motorcycle-engine-number"
                class="input-field text-gray-700 mb-2"
                data-i18n-placeholder="example_engine"
                placeholder="مثال: ENG-001"
                required
              />
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-100 mb-2" data-i18n="gps"
                >جی پی اس</label
              >
              <select
                id="motorcycle-gps"
                class="input-field block text-sm font-semibold text-gray-700 mb-2"
                onchange="toggleGpsStatusField()"
              >
                <option value="" data-i18n="select">انتخاب کنید</option>
                <option value="دارد" data-i18n="has_gps">دارد</option>
                <option value="ندارد" data-i18n="no_gps">ندارد</option>
              </select>
            </div>
            <div id="gps-status-field" style="display: none">
              <label class="block text-sm font-semibold text-gray-100 mb-2" data-i18n="gps_status"
                >وضعیت جی پی اس</label
              >
              <select
                id="motorcycle-gps-status"
                class="input-field block text-sm font-semibold text-gray-700 mb-2"
              >
                <option value="" data-i18n="select">انتخاب کنید</option>
                <option value="فعال" data-i18n="active_gps">فعال</option>
                <option value="غیر فعال" data-i18n="inactive_gps">غیر فعال</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-100 mb-2" data-i18n="department"
                >دیپارتمنت</label
              >
              <input
                type="text"
                id="motorcycle-department"
                class="input-field text-gray-700 mb-2"
                data-i18n-placeholder="example_department"
                placeholder="مثال: پاور"
                required
              />
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-100 mb-2" data-i18n="motorcycle_status"
                >وضعیت موتور سکیل</label
              >
              <select
                id="motorcycle-status"
                class="input-field block text-sm font-semibold text-gray-700 mb-2"
                required
              >
                <option value="سالم" data-i18n="healthy">سالم</option>
                <option value="مفقود" data-i18n="missing">مفقود</option>
                <option value="خراب" data-i18n="broken">خراب</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-100 mb-2" data-i18n="motorcycle_photo"
                >عکس موتور سکیل</label
              >
              <input
                type="file"
                id="motorcycle-photo"
                class="input-field text-gray-700 mb-2"
                accept="image/*"
                onchange="previewMotorcyclePhoto(this)"
              />
              <div id="motorcycle-photo-preview" class="mt-2 hidden">
                <img id="motorcycle-photo-preview-img" src="" class="w-full h-48 object-contain rounded-lg" alt="پریویو عکس">
              </div>
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-100 mb-2" data-i18n="motorcycle_documents"
                >اسناد موتور سکیل</label
              >
              <input
                type="file"
                id="motorcycle-documents"
                class="input-field text-gray-700 mb-2"
                accept="image/*,.pdf"
                onchange="previewMotorcycleDocuments(this)"
              />
              <div id="motorcycle-documents-preview" class="mt-2 hidden">
                <p id="motorcycle-documents-name" class="text-sm text-gray-700"></p>
              </div>
            </div>
            <div class="flex gap-3 mt-6">
              <button type="submit" class="btn btn-success flex-1">
                ✅ <span data-i18n="save">ذخیره</span>
              </button>
              <button
                type="button"
                class="btn btn-secondary flex-1"
                onclick="closeModal('new-motorcycle-modal')"
              >
                ❌ <span data-i18n="cancel">انصراف</span>
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>

                <option value="" data-i18n="select">انتخاب کنید</option>
                <option value="فعال" data-i18n="active_gps">فعال</option>
                <option value="غیر فعال" data-i18n="inactive_gps">غیر فعال</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-100 mb-2" data-i18n="department"
                >دیپارتمنت</label
              >
              <input
                type="text"
                id="edit-motorcycle-department"
                class="input-field text-gray-800 mb-2"
                data-i18n-placeholder="example_department"
                placeholder="مثال: پاور"
                required
              />
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-100 mb-2" data-i18n="motorcycle_status"
                >وضعیت موتور سکیل</label
              >
              <select
                id="edit-motorcycle-status"
                class="input-field text-gray-800 mb-2"
                required
              >
                <option value="سالم" data-i18n="healthy">سالم</option>
                <option value="مفقود" data-i18n="missing">مفقود</option>
                <option value="خراب" data-i18n="broken">خراب</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-100 mb-2" data-i18n="motorcycle_photo_optional"
                >عکس موتور سکیل (اختیاری)</label
              >
              <input
                type="file"
                id="edit-motorcycle-photo"
                class="input-field text-gray-800 mb-2"
                accept="image/*"
                onchange="previewEditMotorcyclePhoto(this)"
              />
              <div id="edit-motorcycle-photo-preview" class="mt-2 hidden">
                <img id="edit-motorcycle-photo-preview-img" src="" class="w-full h-48 object-contain rounded-lg" alt="پریویو عکس">
              </div>
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-100 mb-2" data-i18n="motorcycle_documents_optional"
                >اسناد موتور سکیل (اختیاری)</label>
              <input
                type="file"
                id="edit-motorcycle-documents"
                class="input-field text-gray-800 mb-2"
                accept="image/*,.pdf"
                onchange="previewEditMotorcycleDocuments(this)"
              />
              <div id="edit-motorcycle-documents-preview" class="mt-2 hidden">
                <p id="edit-motorcycle-documents-name" class="text-sm text-gray-700"></p>
              </div>
            </div>
            <div class="flex gap-3 mt-6">
              <button type="submit" class="btn btn-success flex-1">
                ✅ <span data-i18n="save">ذخیره</span>
              </button>
              <button
                type="button"
                class="btn btn-secondary flex-1"
                onclick="closeModal('edit-motorcycle-modal')"
              >
                ❌ <span data-i18n="cancel">انصراف</span>
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
    <div id="motorcycle-details-modal" class="modal">
      <div class="modal-content max-w-2xl relative">
        <button
          class="close-btn"
          onclick="closeModal('motorcycle-details-modal')"
        >
          ❌
        </button>
        <h2 class="text-2xl font-bold text-gray-300 mb-6" data-i18n="motorcycle_details">
          🏍️ جزئیات کامل موتور سکیل
        </h2>
        <div
          id="motorcycle-details-content"
          class="space-y-6 bg-gray-50 p-6 rounded-xl"
        >
        </div>
        <div class="flex gap-3 mt-6 pt-4 border-t">
          <button id="edit-from-details-btn" class="btn btn-primary flex-1">
            ✏️ <span data-i18n="edit">ویرایش</span>
          </button>
          <button id="delete-from-details-btn" class="btn btn-danger flex-1">
            🗑️ <span data-i18n="delete">حذف</span>
          </button>
        </div>
      </div>
    </div>
    <div id="new-employee-modal" class="modal">
      <div class="modal-content">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">
          افزودن کارمند جدید
        </h2>
        <form id="new-employee-form" onsubmit="submitNewEmployee(event)">
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2"
                >نام و نام خانوادگی</label
              >
              <input
                type="text"
                id="employee-name"
                class="input-field"
                placeholder="مثال: شهاب حمیدی"
                required
              />
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2"
                >آیدی</label
              >
              <input
                type="text"
                id="employee-id"
                class="input-field"
                placeholder="مثال: 1806"
                required
              />
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2"
                >دیپارتمنت</label
              >
              <input
                type="text"
                id="employee-department"
                class="input-field"
                placeholder="مثال: پاور"
                required
              />
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2"
                >شناسه اثر انگشت</label
              >
              <input
                type="text"
                id="employee-fingerprint"
                class="input-field"
                placeholder="مثال: SH001"
                required
              />
            </div>
            <div class="flex gap-3 mt-6">
              <button type="submit" class="btn btn-success flex-1">
                ✅ ذخیره
              </button>
              <button
                type="button"
                class="btn btn-secondary flex-1"
                onclick="closeModal('new-employee-modal')"
              >
                ❌ انصراف
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
    <div id="toast" class="toast">
      <span id="toast-icon">✅</span> <span id="toast-message"></span>
    </div>
    <script src="./googleSheets.js"></script>
    <script src="./index.js"></script>
  </body>
</html>
